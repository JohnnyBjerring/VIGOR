<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VIGOR</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/VIGOR.Shared/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/VIGOR.Shared/app.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="VIGOR.MAUI.styles.css" />
    <link rel="icon" type="image/svg+xml" href="branding/VigorLogo.svg" />

    <style>
        .vigor-splash {
            position: fixed;
            inset: 0;
            z-index: 2147483000;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: #dbeaf8;
            opacity: 1;
            transition: opacity 320ms ease, visibility 320ms ease;
        }

        .vigor-splash.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .vigor-splash img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vigor-splash-status {
            position: fixed;
            bottom: 34px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 18px;
            border-radius: 999px;
            color: rgba(4, 30, 66, 0.88);
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.82);
            box-shadow: 0 14px 40px rgba(4, 30, 66, 0.16);
            font: 700 0.9rem/1.1 "Segoe UI", Arial, Helvetica, sans-serif;
            backdrop-filter: blur(14px);
        }
    </style>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="vigor-splash" class="vigor-splash" aria-label="VIGOR starter">
        <img src="branding/VigorSplashScreen.png" alt="VIGOR – Visual Integrated Governance &amp; Overlap Registry" />
        <div class="vigor-splash-status">Starter VIGOR...</div>
    </div>

    <div id="app" aria-live="polite"></div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <div id="debug-console"
        style="position: fixed; bottom: 0; left: 0; right: 0; height: 40vh; background: black; color: lime; z-index: 9999; overflow: auto; padding: 10px; font-family: monospace; display: none; font-size: 12px; opacity: 0.9;">
        <strong>WEBVIEW CONSOLE</strong><br />
    </div>

    <script>
        const debugConsole = document.getElementById('debug-console');
        const errorUi = document.getElementById('blazor-error-ui');

        function logToScreen(level, color, args) {
            debugConsole.style.display = 'block';
            const msg = Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            debugConsole.innerHTML += '<div style="color:' + color + '; border-bottom: 1px solid #333; padding: 4px 0;">[' + level + '] ' + msg + '</div>';

            if (level === 'ERROR' || level === 'UNCAUGHT') {
                errorUi.style.display = 'block';
                const errSpan = document.createElement('div');
                errSpan.style.color = '#ffaaaa';
                errSpan.style.marginTop = '10px';
                errSpan.innerText = msg;
                errorUi.appendChild(errSpan);
            }
        }

        const oldError = console.error;
        console.error = function () {
            oldError.apply(console, arguments);
            logToScreen('ERROR', '#ff5555', arguments);
        };

        const oldWarn = console.warn;
        console.warn = function () { oldWarn.apply(console, arguments); logToScreen('WARN', 'yellow', arguments); };

        const oldLog = console.log;
        console.log = function () { oldLog.apply(console, arguments); logToScreen('LOG', 'lightgray', arguments); };

        window.onerror = function (message, source, lineno, colno, error) {
            logToScreen('UNCAUGHT', '#ff5555', [message, error ? error.stack : '']);
        };

        // Let's find out EXACTLY what shows the error UI
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'style' && errorUi.style.display === 'block') {
                    // It just got shown!
                    const stack = new Error().stack;
                    logToScreen('ERROR_TRIGGER', '#ff00ff', ['blazor-error-ui was shown! Stack:', stack]);
                    alert("The error UI was triggered! Stack trace: \n" + stack);
                }
            });
        });
        observer.observe(errorUi, { attributes: true });
    </script>

    <script>
        window.addEventListener('load', function () {
            window.setTimeout(function () {
                const splash = document.getElementById('vigor-splash');
                if (splash) {
                    splash.classList.add('is-hidden');
                    window.setTimeout(function () { splash.remove(); }, 380);
                }
            }, 1000);
        });
    </script>

    <script src="_framework/blazor.webview.js"></script>
</body>

</html>
